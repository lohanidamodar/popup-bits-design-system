<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:var(--font-sans);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted)}
  .swatch{display:flex;flex-direction:column;gap:4px;font-size:11px}
  .chip{width:100%;aspect-ratio:2/1;border-radius:10px;border:1px solid rgba(0,0,0,.06)}
  .mono{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
</style></head><body><div class="card" id="content"></div></body></html>

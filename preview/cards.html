<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--bg);font-family:var(--font-sans);color:var(--fg)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .card{background:var(--bg-raised);border-radius:20px;padding:16px;box-shadow:var(--sh-sm);display:flex;flex-direction:column;gap:8px}
  .card h4{margin:0;font-size:16px;font-weight:800}
  .card p{margin:0;color:var(--fg-muted);font-size:13px;line-height:1.5}
  .icon{width:40px;height:40px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:900;font-family:var(--font-display);font-size:22px}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;color:#fff;background:var(--accent)}
  .hero{grid-column:1/-1;padding:22px;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 18%, transparent);box-shadow:none}
  .hero h3{margin:0;font-family:var(--font-display);font-size:24px;color:var(--accent-ink)}
</style></head><body class="theme-meropatro">
<div class="grid">
  <div class="card hero">
    <h3>आज बुधबार</h3>
    <p style="color:var(--accent-ink)">२०८२ बैशाख ८ · Apr 20, 2026 · आज तिथि अष्टमी।</p>
  </div>
  <div class="card"><div class="icon">अ</div><h4>Alphabet</h4><p>Learn Nepali barnamala with audio and games.</p></div>
  <div class="card"><div class="icon">१</div><h4>Numbers</h4><p>Count with balloons, coins, and everyday objects.</p><span class="pill">New</span></div>
  <div class="card"><div class="icon">क</div><h4>Words</h4><p>Common household words with pronunciation.</p></div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-sans)}
  .line{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .label{width:80px;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
  .bar{height:16px;background:var(--accent);border-radius:4px}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}
</style></head><body>
<div class="line"><div class="label">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
<div class="line"><div class="label">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
<div class="line"><div class="label">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
<div class="line"><div class="label">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16 px (base)</div></div>
<div class="line"><div class="label">sp-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
<div class="line"><div class="label">sp-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
<div class="line"><div class="label">sp-12</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
<div class="line"><div class="label">sp-16</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
<div class="line"><div class="label">sp-20</div><div class="bar" style="width:80px"></div><div class="px">80 px</div></div>
</body></html>

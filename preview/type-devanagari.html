<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans);color:var(--fg)}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border:0}
  .row .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);width:140px;flex:none}
</style></head><body>
<div class="row"><div class="spec">Mukta · 72/700</div><div class="t-deva-display">नमस्ते</div></div>
<div class="row"><div class="spec">Mukta · 40/700</div><div style="font-family:var(--font-deva);font-size:40px;font-weight:700">मेरो पात्रो</div></div>
<div class="row"><div class="spec">Mukta · 24/600</div><div style="font-family:var(--font-deva);font-size:24px;font-weight:600">अ आ इ ई उ ऊ ऋ</div></div>
<div class="row"><div class="spec">Mukta · 18/400</div><div class="t-deva" style="font-size:18px">नेपाली भाषा सिक्ने रमाइलो तरिका — बच्चाहरूका लागि।</div></div>
<div class="row"><div class="spec">Mukta · 16/400</div><div class="t-deva" style="font-size:16px">मेरो नेपाली एप निःशुल्क छ र विज्ञापन छैन।</div></div>
</body></html>

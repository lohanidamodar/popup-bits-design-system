<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-sans);color:var(--fg)}
  h3{margin:0 0 10px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:14px;align-items:end}
  .app{display:flex;flex-direction:column;align-items:center;gap:8px}
  .icn{width:88px;height:88px;border-radius:28%;overflow:hidden;box-shadow:var(--sh-md);display:flex;align-items:center;justify-content:center}
  .icn img{width:100%;height:100%}
  .nm{font-size:12px;font-weight:700}
  .tg{font-size:10px;color:var(--fg-muted)}
</style></head><body>
<h3>Product marks · squircle · 28 % corner</h3>
<div class="grid">
  <div class="app"><div class="icn"><img src="../assets/logos/popupbits-mark.svg"></div><div class="nm">Popup Bits</div><div class="tg">Studio</div></div>
  <div class="app"><div class="icn"><img src="../assets/logos/meropatro-mark.svg"></div><div class="nm">Mero Patro</div><div class="tg">Calendar</div></div>
  <div class="app"><div class="icn"><img src="../assets/logos/meronepali-mark.svg"></div><div class="nm">Mero Nepali</div><div class="tg">Kids</div></div>
  <div class="app"><div class="icn"><img src="../assets/logos/spellcraft-mark.svg"></div><div class="nm">SpellCraft</div><div class="tg">Kids</div></div>
  <div class="app"><div class="icn"><img src="../assets/logos/jyotish-mark.svg"></div><div class="nm">Jyotish</div><div class="tg">Cultural · WIP</div></div>
  <div class="app"><div class="icn"><img src="../assets/logos/sanskrit-mark.svg"></div><div class="nm">Sanskrit</div><div class="tg">Cultural · WIP</div></div>
  <div class="app"><div class="icn"><img src="../assets/logos/rent-mark.svg"></div><div class="nm">Rent</div><div class="tg">Marketplace · WIP</div></div>
</div>
</body></html>

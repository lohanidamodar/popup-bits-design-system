<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg);font-family:var(--font-sans);color:var(--fg)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:96px;height:64px;background:#fff;border-radius:14px}
  .cap{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);text-align:center}
  .cap b{display:block;font-weight:700;color:var(--fg);font-family:var(--font-sans);font-size:12px}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="box" style="box-shadow:var(--sh-xs)"></div><div class="cap"><b>xs</b>hairline</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--sh-sm)"></div><div class="cap"><b>sm</b>cards at rest</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--sh-md)"></div><div class="cap"><b>md</b>hover / popovers</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--sh-lg)"></div><div class="cap"><b>lg</b>menus / drawers</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--sh-xl)"></div><div class="cap"><b>xl</b>modals</div></div>
</div>
</body></html>

name: popup_bits_design
description: Popup Bits base design system for Flutter — tokens, archetypes, and a composable ThemeData builder. Bring your own product theme.
version: 0.1.0
homepage: https://github.com/popupbits/popup_bits_design
repository: https://github.com/popupbits/popup_bits_design
issue_tracker: https://github.com/popupbits/popup_bits_design/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Google's split-out Material / Cupertino UI libraries. Currently
  # one-line re-exports of `package:flutter/material.dart` and
  # `package:flutter/cupertino.dart`, but pinning the package to the
  # standalone libraries gives a clean decoupling point if/when the
  # Flutter SDK starts dropping these widgets in favour of these
  # packages.
  material_ui: ^0.0.1
  cupertino_ui: ^0.0.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

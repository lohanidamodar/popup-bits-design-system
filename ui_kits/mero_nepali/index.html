<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mero Nepali · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:#1F7B54;font-family:var(--font-sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .phone{width:360px;height:740px;background:var(--bg);border-radius:40px;padding:10px;box-shadow:0 30px 60px rgba(0,0,0,.4);border:6px solid #0E1726;position:relative;overflow:hidden}
  .screen{width:100%;height:100%;border-radius:32px;overflow:hidden;background:#fff;display:flex;flex-direction:column;position:relative}
  .statusbar{height:28px;display:flex;align-items:center;justify-content:space-between;padding:6px 16px;font-size:11px;font-weight:700;color:var(--fg);flex:none}
  .statusbar .dots{display:flex;gap:4px;align-items:center}
  .statusbar .dot{width:12px;height:12px;border:2px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center}

  .appbar{display:flex;align-items:center;gap:10px;padding:12px 18px 4px;flex:none}
  .appbar .logo{width:34px;height:34px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-family:var(--font-deva)}
  .appbar .title{font-family:var(--font-deva);font-size:20px;font-weight:700;color:var(--accent-ink);flex:1}
  .appbar .bell{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:800}

  .content{flex:1;overflow-y:auto;padding:14px 18px 90px;display:flex;flex-direction:column;gap:14px}

  .hero-card{border-radius:24px;padding:18px;color:#fff;background:linear-gradient(135deg,var(--accent),#1F7B54);box-shadow:var(--sh-md);display:flex;justify-content:space-between;align-items:center}
  .hero-card .big{font-family:var(--font-deva);font-size:60px;font-weight:700;line-height:1}
  .hero-card .sub{font-size:13px;opacity:.9;margin-top:4px}
  .hero-card .cta{margin-top:10px;background:#fff;color:var(--accent-ink);font-weight:800;padding:8px 16px;border-radius:999px;font-size:13px;display:inline-block}
  .hero-card .right{width:90px;height:90px;border-radius:22px;background:#fff;color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-deva);font-size:60px;font-weight:700;box-shadow:var(--sh-sm)}

  .section-title{font-family:var(--font-sans);font-weight:800;font-size:15px;color:var(--accent-ink);margin-top:4px;display:flex;justify-content:space-between}
  .section-title a{color:var(--accent);font-size:12px;font-weight:700;text-decoration:none}

  .tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tile{aspect-ratio:1.15;border-radius:20px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--sh-sm);position:relative;overflow:hidden;cursor:pointer}
  .tile .letter{font-family:var(--font-deva);font-size:42px;font-weight:700;align-self:flex-end}
  .tile .name{font-size:13px;font-weight:800}
  .tile .prog{height:6px;border-radius:999px;background:rgba(255,255,255,.5);overflow:hidden;margin-top:6px}
  .tile .prog i{display:block;height:100%;background:#fff;border-radius:999px}

  .tile.t1{background:#FFE8CC;color:#8A4B00}
  .tile.t2{background:#D7E8FF;color:#124378}
  .tile.t3{background:#FFE1E8;color:#9B1E45}
  .tile.t4{background:#DFF3E1;color:#1F7B54}

  /* balloons mini scene */
  .scene{height:120px;border-radius:20px;background:linear-gradient(180deg,var(--mn-sky) 0%,#cdebff 70%,var(--mn-grass) 70%,#5aa35f 100%);position:relative;overflow:hidden;box-shadow:var(--sh-sm)}
  .sun{position:absolute;right:14px;top:14px;width:28px;height:28px;border-radius:50%;background:var(--mn-sun);box-shadow:0 0 0 6px rgba(255,201,60,.3)}
  .balloon{position:absolute;width:34px;height:42px;border-radius:50% 50% 50% 50%/45% 45% 55% 55%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-deva);font-weight:700;font-size:18px;box-shadow:inset -4px -6px 0 rgba(0,0,0,.12)}
  .balloon::after{content:"";position:absolute;bottom:-14px;width:1.5px;height:30px;background:#1B1F2A}
  .b1{background:var(--mn-red);left:22px;top:14px}
  .b2{background:var(--mn-sun);left:90px;top:6px;color:#8A4B00}
  .b3{background:var(--mn-blue);left:160px;top:22px}
  .b4{background:#6aba5b;left:230px;top:10px}
  .grass-tuft{position:absolute;bottom:0;width:12px;height:10px;background:#5aa35f;border-radius:50% 50% 0 0}

  /* Bottom nav */
  .nav{position:absolute;bottom:10px;left:18px;right:18px;height:64px;background:#fff;border-radius:20px;box-shadow:var(--sh-lg);display:flex;justify-content:space-around;align-items:center}
  .nav .item{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--fg-muted);font-size:10px;font-weight:700;cursor:pointer}
  .nav .item.active{color:var(--accent)}
  .nav .item .ic{width:28px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-deva);font-weight:800}
  .nav .item.active .ic{background:var(--accent-soft);color:var(--accent)}
</style>
</head>
<body class="arch-kid theme-meronepali">
  <div class="phone">
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="dots"><span>●●●●</span><span>100%</span></span>
      </div>

      <div class="appbar">
        <div class="logo">म</div>
        <div class="title">मेरो नेपाली</div>
        <div class="bell">🔔</div>
      </div>

      <div class="content">
        <div class="hero-card">
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.85;font-weight:800">Today's letter</div>
            <div class="big">आ</div>
            <div class="sub">आमा · आँप · आकाश</div>
            <div class="cta">Practice →</div>
          </div>
          <div class="right">ऋ</div>
        </div>

        <div class="section-title">Modules <a href="#">See all</a></div>
        <div class="tile-grid">
          <div class="tile t1">
            <div>
              <div class="name">अ-ई भकालन</div>
              <div class="prog"><i style="width:60%"></i></div>
            </div>
            <div class="letter">अ</div>
          </div>
          <div class="tile t2">
            <div>
              <div class="name">संख्या</div>
              <div class="prog"><i style="width:35%"></i></div>
            </div>
            <div class="letter">१</div>
          </div>
          <div class="tile t3">
            <div>
              <div class="name">शब्द खेल</div>
              <div class="prog"><i style="width:80%"></i></div>
            </div>
            <div class="letter">क</div>
          </div>
          <div class="tile t4">
            <div>
              <div class="name">बुझाइ</div>
              <div class="prog"><i style="width:20%"></i></div>
            </div>
            <div class="letter">च</div>
          </div>
        </div>

        <div class="section-title">Daily game</div>
        <div class="scene">
          <div class="sun"></div>
          <div class="balloon b1">अ</div>
          <div class="balloon b2">आ</div>
          <div class="balloon b3">इ</div>
          <div class="balloon b4">ई</div>
          <div class="grass-tuft" style="left:12%"></div>
          <div class="grass-tuft" style="left:30%"></div>
          <div class="grass-tuft" style="left:55%"></div>
          <div class="grass-tuft" style="left:78%"></div>
        </div>
      </div>

      <div class="nav">
        <div class="item active"><div class="ic">म</div>Home</div>
        <div class="item"><div class="ic">अ</div>Learn</div>
        <div class="item"><div class="ic">★</div>Play</div>
        <div class="item"><div class="ic">◕</div>Me</div>
      </div>
    </div>
  </div>
</body>
</html>
